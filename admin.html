<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAR | Admin Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --bg-deep: #121814; --liquid-emerald: #14805c; --liquid-gold: #e3be75; --nav-bg: rgba(18, 24, 20, 0.98); --glass-bg: rgba(30, 45, 38, 0.45); }
        * { box-sizing: border-box; }
        body { margin: 0; padding-top: 100px; font-family: 'Montserrat', sans-serif; background-color: var(--bg-deep); color: #fff; display: flex; flex-direction: column; align-items: center; }
        
        /* FULL NAVBAR RESTORED */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: var(--nav-bg); border-bottom: 1px solid rgba(227, 190, 117, 0.15); z-index: 1000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; color: var(--liquid-gold); letter-spacing: 1px; text-transform: uppercase; cursor: pointer; }
        .nav-links { display: flex; gap: 30px; list-style: none; margin: 0; padding: 0; align-items: center; }
        .nav-links li { cursor: pointer; font-size: 0.85rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.75); transition: color 0.3s; text-decoration: none; }
        .nav-links li:hover, .nav-links li.active { color: var(--liquid-gold); }
        .nav-links a { color: inherit; text-decoration: none; }
        #nav-logout { border: 1px solid rgba(255, 77, 77, 0.5); color: #ff4d4d; padding: 8px 16px; border-radius: 20px; transition: all 0.3s; }
        #nav-logout:hover { background: #ff4d4d; color: #fff; }
        
        /* MOBILE MENU FIX */
        .menu-toggle { display: none; color: var(--liquid-gold); font-size: 1.5rem; cursor: pointer; }
        @media (max-width: 900px) {
            .menu-toggle { display: block; }
            .nav-links { display: flex; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: var(--nav-bg); padding: 0; text-align: center; max-height: 0; overflow: hidden; transition: max-height 0.5s ease, padding 0.5s ease; }
            .nav-links.show { max-height: 400px; padding: 20px 0; }
            .nav-links li { padding: 15px 0; }
        }

        .dashboard-wrapper { width: 90%; max-width: 1100px; padding: 20px 0; }
        h1 { font-family: 'Cormorant Garamond', serif; color: var(--liquid-gold); text-transform: uppercase; font-size: 2.2rem; margin-bottom: 30px; border-bottom: 1px solid rgba(227, 190, 117, 0.2); padding-bottom: 15px; }
        
        .dashboard-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        h3 { color: var(--liquid-gold); margin-top: 0; letter-spacing: 2px; text-transform: uppercase; font-size: 1rem; }

        /* MOBILE RESPONSIVE TABLE FIX */
        .table-container { width: 100%; overflow-x: auto; margin-top: 15px; }
        table { width: 100%; min-width: 600px; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); white-space: nowrap; }
        th { color: var(--liquid-emerald); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
        td { font-weight: 300; font-size: 0.85rem; }
        .role-badge { background: rgba(227, 190, 117, 0.1); color: var(--liquid-gold); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; border: 1px solid var(--liquid-gold); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand" onclick="window.location.href='index.html'">EduAR</div>
        <div class="menu-toggle" id="menu-icon">☰</div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#simulations">Simulations</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li class="active">Admin Panel</li>
            <li id="nav-logout">Logout</li>
        </ul>
    </nav>

    <div class="dashboard-wrapper">
        <h1>Command Center</h1>
        <div class="dashboard-card">
            <h3>Registered Users Network</h3>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Email Address</th>
                            <th>Role</th>
                            <th>User ID</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <tr><td colspan="3" style="text-align: center; color: gray;">Loading network data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtMiaIlQdLzY_K9pqy1mpgGFzIXbX7IEE", authDomain: "eduar-7425d.firebaseapp.com", projectId: "eduar-7425d", storageBucket: "eduar-7425d.firebasestorage.app", messagingSenderId: "316275134268", appId: "1:316275134268:web:93223c518bca38f73f9839"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Menu Toggle
        const menuIcon = document.getElementById('menu-icon');
        const navLinks = document.getElementById('nav-links');
        menuIcon.addEventListener('click', () => {
            navLinks.classList.toggle('show');
            menuIcon.style.transform = navLinks.classList.contains('show') ? 'rotate(90deg)' : 'rotate(0deg)';
        });

        // Security Guard
        auth.onAuthStateChanged(user => {
            if (!user) { window.location.replace("login.html"); } 
            else {
                db.collection("users").doc(user.uid).get().then(doc => {
                    if (doc.exists && doc.data().role === "admin") { fetchUsers(); } 
                    else {
                        alert("Access Denied: Administrator privileges required.");
                        window.location.replace("index.html");
                    }
                }).catch(error => { window.location.replace("index.html"); });
            }
        });

        // Fetch Users
        function fetchUsers() {
            db.collection("users").get().then((querySnapshot) => {
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = ''; 
                if(querySnapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">No users found.</td></tr>';
                    return;
                }
                querySnapshot.forEach((doc) => {
                    const user = doc.data();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${user.email || 'N/A'}</td>
                        <td><span class="role-badge">${user.role || 'user'}</span></td>
                        <td style="font-family: monospace; color: gray;">${doc.id}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }).catch(error => {
                document.getElementById('user-table-body').innerHTML = `<tr><td colspan="3" style="color: red;">Error: Make sure Firestore Rules allow read access.</td></tr>`;
            });
        }

        // Logout
        document.getElementById('nav-logout').addEventListener('click', () => {
            auth.signOut().then(() => window.location.replace("login.html"));
        });
    </script>
</body>
</html>
